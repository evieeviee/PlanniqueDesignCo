.project small{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}.project strong{font-size:14px}.nav{margin-top:26px;display:grid;gap:8px}.nav button{width:100%;text-align:left;border:0;background:transparent;color:#8f97a8;padding:13px 14px;border-radius:14px;font-weight:700}.nav button.active{background:rgba(255,255,255,.07);color:white}.nav button.done:after{content:&#x27;✓&#x27;;float:right;color:var(--mint)}
.side-bottom{margin-top:auto;color:#737b8c;font-size:11px;line-height:1.55}.main{min-width:0;padding:24px}.topbar{height:58px;display:flex;align-items:center;justify-content:space-between;gap:20px}.progress-wrap{display:flex;align-items:center;gap:12px;min-width:240px}.progress{height:7px;flex:1;background:#1b202c;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;width:20%;background:linear-gradient(90deg,var(--pink),var(--violet));transition:.3s}.step-label{font-size:12px;color:var(--muted)}
.btn{border:0;border-radius:999px;padding:13px 20px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.2s}.btn:hover{transform:translateY(-1px)}.primary{background:linear-gradient(135deg,var(--pink),var(--violet));color:white;box-shadow:0 14px 28px rgba(143,124,255,.22)}.secondary{background:transparent;border:1px solid var(--line);color:white}.ghost{background:rgba(255,255,255,.05);color:#d9ddea}
.stage{max-width:1180px;margin:20px auto 50px}.screen{display:none;animation:fade .3s ease}.screen.active{display:block}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.heading{max-width:740px;margin-bottom:28px}.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--mint);font-weight:900}.heading h1{font-size:clamp(38px,5vw,64px);letter-spacing:-.055em;line-height:1.02;margin:10px 0 14px}.heading p{color:var(--muted);font-size:17px;line-height:1.7;margin:0}
.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.025));border-radius:var(--r);padding:28px;box-shadow:var(--shadow)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.field.full{grid-column:1/-1}.field label{display:block;font-size:12px;color:#b0b7c5;font-weight:800;margin-bottom:8px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);background:#0c0f18;color:white;border-radius:15px;padding:15px 16px;outline:none}.field textarea{min-height:120px;resize:vertical}.field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(255,115,209,.55);box-shadow:0 0 0 4px rgba(255,115,209,.07)}
.category-grid,.style-grid,.tone-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.choice{border:1px solid var(--line);background:rgba(255,255,255,.035);border-radius:20px;padding:20px;min-height:150px;position:relative;transition:.2s}.choice:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.2)}.choice.selected{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,115,209,.10)}.choice input{position:absolute;opacity:0}.choice .icon{font-size:30px}.choice h3{margin:20px 0 8px}.choice p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}.check{position:absolute;right:14px;top:14px;width:24px;height:24px;border-radius:50%;border:1px solid var(--line);display:grid;place-items:center;font-size:12px}.choice.selected .check{background:linear-gradient(135deg,var(--pink),var(--violet));border-color:transparent}
.style-card{padding:0;overflow:hidden}.style-preview{height:190px;padding:22px;display:flex;flex-direction:column;justify-content:flex-end}.luxury{background:linear-gradient(135deg,#30221f,#b58c78)}.soft{background:linear-gradient(135deg,#f5dbe8,#f3eee7);color:#46333d}.minimal{background:linear-gradient(135deg,#fff,#dfe4ea);color:#15171b}.dark{background:linear-gradient(135deg,#060606,#2b2b2b)}.style-preview small{font-size:9px;letter-spacing:.15em;text-transform:uppercase}.style-preview strong{font-family:Georgia,serif;font-size:25px;margin-top:7px}.style-info{padding:18px}.style-info h3{margin:0 0 8px}.style-info p{margin:0;color:var(--muted);font-size:13px}.style-grid{grid-template-columns:repeat(4,1fr)}
.chat-layout{display:grid;grid-template-columns:1fr 380px;gap:20px}.chat{min-height:560px;display:flex;flex-direction:column}.messages{display:grid;gap:14px;flex:1;align-content:start}.message{max-width:78%;padding:15px 17px;border-radius:18px;font-size:14px;line-height:1.55}.message.ai{background:#1c2230;border-bottom-left-radius:5px}.message.user{margin-left:auto;background:linear-gradient(135deg,var(--pink),var(--violet));border-bottom-right-radius:5px}.chat-input{margin-top:18px;display:flex;gap:10px}.chat-input input{flex:1;border:1px solid var(--line);background:#0c0f18;color:white;border-radius:999px;padding:15px 18px;outline:none}.summary-list{display:grid;gap:12px}.summary-item{border:1px solid var(--line);border-radius:16px;padding:14px;background:rgba(255,255,255,.03)}.summary-item small{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px}.summary-item div{font-size:13px;line-height:1.5}
.generate-card{text-align:center;padding:70px 28px}.loader{width:82px;height:82px;border-radius:50%;margin:0 auto 24px;border:7px solid rgba(255,255,255,.08);border-top-color:var(--pink);animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.gen-status{display:grid;gap:12px;max-width:440px;margin:30px auto 0}.gen-row{display:flex;align-items:center;gap:12px;text-align:left;color:#aab1c0}.dot{width:22px;height:22px;border-radius:50%;border:1px solid var(--line);display:grid;place-items:center;font-size:11px}.gen-row.done{color:white}.gen-row.done .dot{background:#173f36;color:var(--mint);border-color:#265e50}
.preview-layout{display:grid;grid-template-columns:290px 1fr;gap:20px}.editor{position:sticky;top:85px;height:fit-content}.editor h3{margin-top:0}.editor-tabs{display:grid;gap:8px}.editor-tabs button{text-align:left;border:1px solid var(--line);background:rgba(255,255,255,.03);color:#b8bfcc;padding:13px;border-radius:13px}.editor-tabs button.active{color:white;border-color:rgba(255,115,209,.45);background:rgba(255,115,209,.08)}.site-frame{background:#f8f4ef;color:#2c2623;border-radius:24px;overflow:hidden;box-shadow:var(--shadow)}.site-nav{height:68px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;background:#fff}.site-logo{font-weight:900}.site-links{display:flex;gap:22px;font-size:12px}.site-hero{min-height:440px;padding:54px;background:linear-gradient(90deg,rgba(42,28,25,.90),rgba(42,28,25,.25)),linear-gradient(135deg,#89685b,#d5ab96);color:white;display:flex;flex-direction:column;justify-content:flex-end}.site-hero small{letter-spacing:.17em;text-transform:uppercase}.site-hero h2{font-family:Georgia,serif;font-size:58px;line-height:.98;max-width:650px;margin:12px 0}.site-hero p{max-width:560px;line-height:1.65;opacity:.86}.site-sections{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:20px}.site-box{min-height:210px;border-radius:18px;background:#eee6df;padding:26px}.site-box.dark{background:#28211f;color:#fff}.site-box h3{font-family:Georgia,serif;font-size:28px;margin:10px 0}.site-box p{line-height:1.65;font-size:13px;opacity:.75}
.actions{display:flex;justify-content:space-between;gap:12px;margin-top:24px}.toast{position:fixed;right:20px;bottom:20px;background:#111520;border:1px solid var(--line);border-radius:16px;padding:15px 18px;box-shadow:var(--shadow);display:none;z-index:50}.toast.show{display:block}
@media(max-width:1050px){.app{grid-template-columns:90px 1fr}.sidebar{padding:18px 12px}.brand span:last-child,.project,.nav button span,.side-bottom{display:none}.brand{justify-content:center}.nav button{text-align:center}.style-grid{grid-template-columns:repeat(2,1fr)}.chat-layout,.preview-layout{grid-template-columns:1fr}.editor{position:relative;top:auto}.category-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.app{display:block}.sidebar{height:auto;position:relative;display:flex;flex-direction:row;align-items:center;border-right:0;border-bottom:1px solid var(--line)}.nav,.side-bottom,.project{display:none}.main{padding:14px}.topbar{height:auto;align-items:flex-start}.form-grid,.category-grid,.style-grid,.tone-grid{grid-template-columns:1fr}.field.full{grid-column:auto}.heading h1{font-size:42px}.site-hero{padding:32px;min-height:360px}.site-hero h2{font-size:42px}.site-sections{grid-template-columns:1fr}.chat-layout{grid-template-columns:1fr}.actions{flex-direction:column-reverse}.actions .btn{width:100%}}

&lt;body&gt;
&lt;div class=&quot;app&quot;&gt;
  &lt;aside class=&quot;sidebar&quot;&gt;
    &lt;div class=&quot;brand&quot;&gt;&lt;div class=&quot;mark&quot;&gt;P&lt;/div&gt;&lt;span&gt;Plannique AI&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;project&quot;&gt;&lt;small&gt;Current project&lt;/small&gt;&lt;strong id=&quot;sideProject&quot;&gt;New Business&lt;/strong&gt;&lt;/div&gt;
    &lt;div class=&quot;nav&quot;&gt;
      &lt;button class=&quot;active&quot; data-nav=&quot;1&quot;&gt;&lt;span&gt;1. Business&lt;/span&gt;&lt;/button&gt;
      &lt;button data-nav=&quot;2&quot;&gt;&lt;span&gt;2. Style&lt;/span&gt;&lt;/button&gt;
      &lt;button data-nav=&quot;3&quot;&gt;&lt;span&gt;3. AI Interview&lt;/span&gt;&lt;/button&gt;
      &lt;button data-nav=&quot;4&quot;&gt;&lt;span&gt;4. Generate&lt;/span&gt;&lt;/button&gt;
      &lt;button data-nav=&quot;5&quot;&gt;&lt;span&gt;5. Preview&lt;/span&gt;&lt;/button&gt;
    &lt;/div&gt;
    &lt;div class=&quot;side-bottom&quot;&gt;Plannique AI Studio&lt;br&gt;Interactive MVP prototype&lt;/div&gt;
  &lt;/aside&gt;

  &lt;main class=&quot;main&quot;&gt;
    &lt;div class=&quot;topbar&quot;&gt;
      &lt;div class=&quot;progress-wrap&quot;&gt;&lt;div class=&quot;progress&quot;&gt;&lt;span id=&quot;progressBar&quot;&gt;&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;step-label&quot; id=&quot;stepLabel&quot;&gt;Step 1 of 5&lt;/div&gt;&lt;/div&gt;
      &lt;button class=&quot;btn ghost&quot; onclick=&quot;resetPrototype()&quot;&gt;Reset prototype&lt;/button&gt;
    &lt;/div&gt;

    &lt;div class=&quot;stage&quot;&gt;
      &lt;section class=&quot;screen active&quot; data-screen=&quot;1&quot;&gt;
        &lt;div class=&quot;heading&quot;&gt;&lt;div class=&quot;eyebrow&quot;&gt;Step 1 · Business profile&lt;/div&gt;&lt;h1&gt;Tell us about your business.&lt;/h1&gt;&lt;p&gt;This information becomes the foundation for the website. You can edit everything later.&lt;/p&gt;&lt;/div&gt;
        &lt;div class=&quot;card&quot;&gt;
          &lt;div class=&quot;form-grid&quot;&gt;
            &lt;div class=&quot;field&quot;&gt;&lt;label&gt;Business name&lt;/label&gt;&lt;input id=&quot;businessName&quot; placeholder=&quot;e.g. Sundae Beauty Lab&quot; /&gt;&lt;/div&gt;
            &lt;div class=&quot;field&quot;&gt;&lt;label&gt;Your name&lt;/label&gt;&lt;input id=&quot;ownerName&quot; placeholder=&quot;e.g. Wendy&quot; /&gt;&lt;/div&gt;
            &lt;div class=&quot;field full&quot;&gt;&lt;label&gt;What type of business is this?&lt;/label&gt;
              &lt;div class=&quot;category-grid&quot; id=&quot;categoryGrid&quot;&gt;
                &lt;label class=&quot;choice&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;category&quot; value=&quot;Hair Salon&quot;&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;span class=&quot;icon&quot;&gt;✂️&lt;/span&gt;&lt;h3&gt;Hair Salon&lt;/h3&gt;&lt;p&gt;Colour, styling, treatments and consultations.&lt;/p&gt;&lt;/label&gt;
                &lt;label class=&quot;choice&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;category&quot; value=&quot;Beauty Salon&quot;&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;span class=&quot;icon&quot;&gt;✨&lt;/span&gt;&lt;h3&gt;Beauty Salon&lt;/h3&gt;&lt;p&gt;Beauty care, facials and complete personal services.&lt;/p&gt;&lt;/label&gt;
                &lt;label class=&quot;choice&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;category&quot; value=&quot;Nail Studio&quot;&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;span class=&quot;icon&quot;&gt;💅&lt;/span&gt;&lt;h3&gt;Nail Studio&lt;/h3&gt;&lt;p&gt;Manicure, nail art and premium nail treatments.&lt;/p&gt;&lt;/label&gt;
                &lt;label class=&quot;choice&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;category&quot; value=&quot;Aesthetic Clinic&quot;&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;span class=&quot;icon&quot;&gt;🪞&lt;/span&gt;&lt;h3&gt;Aesthetic Clinic&lt;/h3&gt;&lt;p&gt;Professional treatments and modern aesthetic care.&lt;/p&gt;&lt;/label&gt;
                &lt;label class=&quot;choice&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;category&quot; value=&quot;Spa&quot;&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;span class=&quot;icon&quot;&gt;🌿&lt;/span&gt;&lt;h3&gt;Spa&lt;/h3&gt;&lt;p&gt;Relaxation, wellness and restorative experiences.&lt;/p&gt;&lt;/label&gt;
                &lt;label class=&quot;choice&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;category&quot; value=&quot;Other Local Business&quot;&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;span class=&quot;icon&quot;&gt;🏪&lt;/span&gt;&lt;h3&gt;Other Business&lt;/h3&gt;&lt;p&gt;Start with a flexible local-business website structure.&lt;/p&gt;&lt;/label&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;field full&quot;&gt;&lt;label&gt;Short business description&lt;/label&gt;&lt;textarea id=&quot;businessDescription&quot; placeholder=&quot;Tell us what your business offers and what makes it special.&quot;&gt;&lt;/textarea&gt;&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;actions&quot;&gt;&lt;span&gt;&lt;/span&gt;&lt;button class=&quot;btn primary&quot; onclick=&quot;nextFromBusiness()&quot;&gt;Choose website style →&lt;/button&gt;&lt;/div&gt;
      &lt;/section&gt;

      &lt;section class=&quot;screen&quot; data-screen=&quot;2&quot;&gt;
        &lt;div class=&quot;heading&quot;&gt;&lt;div class=&quot;eyebrow&quot;&gt;Step 2 · Visual direction&lt;/div&gt;&lt;h1&gt;Choose the feeling of your website.&lt;/h1&gt;&lt;p&gt;Each style uses the same business information but creates a different visual personality.&lt;/p&gt;&lt;/div&gt;
        &lt;div class=&quot;style-grid&quot; id=&quot;styleGrid&quot;&gt;
          &lt;label class=&quot;choice style-card&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;style&quot; value=&quot;Editorial Luxury&quot;&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;div class=&quot;style-preview luxury&quot;&gt;&lt;small&gt;Editorial luxury&lt;/small&gt;&lt;strong&gt;Beauty, elevated.&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;style-info&quot;&gt;&lt;h3&gt;Editorial Luxury&lt;/h3&gt;&lt;p&gt;Elegant typography, premium spacing and confident imagery.&lt;/p&gt;&lt;/div&gt;&lt;/label&gt;
          &lt;label class=&quot;choice style-card&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;style&quot; value=&quot;Soft Beauty&quot;&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;div class=&quot;style-preview soft&quot;&gt;&lt;small&gt;Soft beauty&lt;/small&gt;&lt;strong&gt;Feel like yourself.&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;style-info&quot;&gt;&lt;h3&gt;Soft Beauty&lt;/h3&gt;&lt;p&gt;Warm, gentle and feminine with a welcoming tone.&lt;/p&gt;&lt;/div&gt;&lt;/label&gt;
          &lt;label class=&quot;choice style-card&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;style&quot; value=&quot;Modern Minimal&quot;&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;div class=&quot;style-preview minimal&quot;&gt;&lt;small&gt;Modern minimal&lt;/small&gt;&lt;strong&gt;Clear. Calm. Modern.&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;style-info&quot;&gt;&lt;h3&gt;Modern Minimal&lt;/h3&gt;&lt;p&gt;Clean structure, simple typography and professional clarity.&lt;/p&gt;&lt;/div&gt;&lt;/label&gt;
          &lt;label class=&quot;choice style-card&quot;&gt;&lt;input type=&quot;radio&quot; name=&quot;style&quot; value=&quot;Dark Premium&quot;&gt;&lt;span class=&quot;check&quot;&gt;✓&lt;/span&gt;&lt;div class=&quot;style-preview dark&quot;&gt;&lt;small&gt;Dark premium&lt;/small&gt;&lt;strong&gt;Designed to stand out.&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;style-info&quot;&gt;&lt;h3&gt;Dark Premium&lt;/h3&gt;&lt;p&gt;High contrast, dramatic visuals and a bold luxury presence.&lt;/p&gt;&lt;/div&gt;&lt;/label&gt;
        &lt;/div&gt;
        &lt;div class=&quot;actions&quot;&gt;&lt;button class=&quot;btn secondary&quot; onclick=&quot;goTo(1)&quot;&gt;← Back&lt;/button&gt;&lt;button class=&quot;btn primary&quot; onclick=&quot;nextFromStyle()&quot;&gt;Talk to Nova →&lt;/button&gt;&lt;/div&gt;
      &lt;/section&gt;

      &lt;section class=&quot;screen&quot; data-screen=&quot;3&quot;&gt;
        &lt;div class=&quot;heading&quot;&gt;&lt;div class=&quot;eyebrow&quot;&gt;Step 3 · AI interview&lt;/div&gt;&lt;h1&gt;Meet Nova, your AI designer.&lt;/h1&gt;&lt;p&gt;Answer a few short questions. Nova will use them to shape your website content and positioning.&lt;/p&gt;&lt;/div&gt;
        &lt;div class=&quot;chat-layout&quot;&gt;
          &lt;div class=&quot;card chat&quot;&gt;
            &lt;div class=&quot;messages&quot; id=&quot;messages&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;chat-input&quot;&gt;&lt;input id=&quot;chatInput&quot; placeholder=&quot;Type your answer...&quot; onkeydown=&quot;if(event.key===&#x27;Enter&#x27;)sendAnswer()&quot;&gt;&lt;button class=&quot;btn primary&quot; onclick=&quot;sendAnswer()&quot;&gt;Send&lt;/button&gt;&lt;/div&gt;
          &lt;/div&gt;
          &lt;aside class=&quot;card&quot;&gt;&lt;h3 style=&quot;margin-top:0&quot;&gt;Business summary&lt;/h3&gt;&lt;div class=&quot;summary-list&quot;&gt;
            &lt;div class=&quot;summary-item&quot;&gt;&lt;small&gt;Business&lt;/small&gt;&lt;div id=&quot;sumBusiness&quot;&gt;Not provided yet&lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;summary-item&quot;&gt;&lt;small&gt;Category&lt;/small&gt;&lt;div id=&quot;sumCategory&quot;&gt;Not selected yet&lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;summary-item&quot;&gt;&lt;small&gt;Style&lt;/small&gt;&lt;div id=&quot;sumStyle&quot;&gt;Not selected yet&lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;summary-item&quot;&gt;&lt;small&gt;Special quality&lt;/small&gt;&lt;div id=&quot;sumSpecial&quot;&gt;Waiting for your answer&lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;summary-item&quot;&gt;&lt;small&gt;Ideal customers&lt;/small&gt;&lt;div id=&quot;sumAudience&quot;&gt;Waiting for your answer&lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;summary-item&quot;&gt;&lt;small&gt;Website tone&lt;/small&gt;&lt;div id=&quot;sumTone&quot;&gt;Waiting for your answer&lt;/div&gt;&lt;/div&gt;
          &lt;/div&gt;&lt;/aside&gt;
        &lt;/div&gt;
        &lt;div class=&quot;actions&quot;&gt;&lt;button class=&quot;btn secondary&quot; onclick=&quot;goTo(2)&quot;&gt;← Back&lt;/button&gt;&lt;button class=&quot;btn primary&quot; id=&quot;generateBtn&quot; onclick=&quot;startGeneration()&quot; disabled&gt;Generate my website →&lt;/button&gt;&lt;/div&gt;
      &lt;/section&gt;

      &lt;section class=&quot;screen&quot; data-screen=&quot;4&quot;&gt;
        &lt;div class=&quot;card generate-card&quot;&gt;&lt;div class=&quot;loader&quot; id=&quot;loader&quot;&gt;&lt;/div&gt;&lt;div class=&quot;eyebrow&quot;&gt;Plannique AI is working&lt;/div&gt;&lt;h1 style=&quot;font-size:48px;margin:12px 0&quot;&gt;Creating your website...&lt;/h1&gt;&lt;p style=&quot;color:var(--muted)&quot;&gt;Nova is combining your business profile, chosen style and interview answers into a complete website draft.&lt;/p&gt;
          &lt;div class=&quot;gen-status&quot;&gt;
            &lt;div class=&quot;gen-row&quot; id=&quot;g1&quot;&gt;&lt;span class=&quot;dot&quot;&gt;1&lt;/span&gt;&lt;span&gt;Analysing your business&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;gen-row&quot; id=&quot;g2&quot;&gt;&lt;span class=&quot;dot&quot;&gt;2&lt;/span&gt;&lt;span&gt;Writing your website content&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;gen-row&quot; id=&quot;g3&quot;&gt;&lt;span class=&quot;dot&quot;&gt;3&lt;/span&gt;&lt;span&gt;Applying your visual style&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;gen-row&quot; id=&quot;g4&quot;&gt;&lt;span class=&quot;dot&quot;&gt;4&lt;/span&gt;&lt;span&gt;Preparing your live preview&lt;/span&gt;&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/section&gt;

      &lt;section class=&quot;screen&quot; data-screen=&quot;5&quot;&gt;
        &lt;div class=&quot;heading&quot;&gt;&lt;div class=&quot;eyebrow&quot;&gt;Step 5 · Live preview&lt;/div&gt;&lt;h1&gt;Your first website draft is ready.&lt;/h1&gt;&lt;p&gt;Use the editor to refine the content. Changes update the preview immediately.&lt;/p&gt;&lt;/div&gt;
        &lt;div class=&quot;preview-layout&quot;&gt;
          &lt;aside class=&quot;card editor&quot;&gt;
            &lt;h3&gt;Edit content&lt;/h3&gt;
            &lt;div class=&quot;field&quot;&gt;&lt;label&gt;Hero headline&lt;/label&gt;&lt;textarea id=&quot;editHeadline&quot; oninput=&quot;updatePreview()&quot;&gt;&lt;/textarea&gt;&lt;/div&gt;
            &lt;div class=&quot;field&quot; style=&quot;margin-top:14px&quot;&gt;&lt;label&gt;Hero description&lt;/label&gt;&lt;textarea id=&quot;editHeroText&quot; oninput=&quot;updatePreview()&quot;&gt;&lt;/textarea&gt;&lt;/div&gt;
            &lt;div class=&quot;field&quot; style=&quot;margin-top:14px&quot;&gt;&lt;label&gt;Primary service title&lt;/label&gt;&lt;input id=&quot;editService&quot; oninput=&quot;updatePreview()&quot;&gt;&lt;/div&gt;
            &lt;button class=&quot;btn ghost&quot; style=&quot;width:100%;margin-top:16px&quot; onclick=&quot;rewriteHeadline()&quot;&gt;✨ Rewrite with AI&lt;/button&gt;
          &lt;/aside&gt;
          &lt;div class=&quot;site-frame&quot;&gt;
            &lt;div class=&quot;site-nav&quot;&gt;&lt;div class=&quot;site-logo&quot; id=&quot;previewName&quot;&gt;Your Business&lt;/div&gt;&lt;div class=&quot;site-links&quot;&gt;&lt;span&gt;About&lt;/span&gt;&lt;span&gt;Services&lt;/span&gt;&lt;span&gt;Reviews&lt;/span&gt;&lt;span&gt;Contact&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
            &lt;div class=&quot;site-hero&quot; id=&quot;previewHero&quot;&gt;&lt;small id=&quot;previewKicker&quot;&gt;Beauty · Confidence · Care&lt;/small&gt;&lt;h2 id=&quot;previewHeadline&quot;&gt;Your premium website is ready.&lt;/h2&gt;&lt;p id=&quot;previewHeroText&quot;&gt;A modern local business experience created around trust, quality and personal service.&lt;/p&gt;&lt;/div&gt;
            &lt;div class=&quot;site-sections&quot;&gt;
              &lt;div class=&quot;site-box&quot;&gt;&lt;small&gt;Our signature service&lt;/small&gt;&lt;h3 id=&quot;previewService&quot;&gt;Personalised beauty experiences.&lt;/h3&gt;&lt;p&gt;Thoughtful service, professional care and attention to every detail.&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;site-box dark&quot;&gt;&lt;small&gt;Why customers choose us&lt;/small&gt;&lt;h3 id=&quot;previewSpecial&quot;&gt;Designed around your confidence.&lt;/h3&gt;&lt;p id=&quot;previewAudience&quot;&gt;Created for customers who value quality, comfort and a personalised experience.&lt;/p&gt;&lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;actions&quot;&gt;&lt;button class=&quot;btn secondary&quot; onclick=&quot;goTo(3)&quot;&gt;← Edit answers&lt;/button&gt;&lt;button class=&quot;btn primary&quot; onclick=&quot;saveDraft()&quot;&gt;Save website draft ✓&lt;/button&gt;&lt;/div&gt;
      &lt;/section&gt;
    &lt;/div&gt;
  &lt;/main&gt;
&lt;/div&gt;
&lt;div class=&quot;toast&quot; id=&quot;toast&quot;&gt;Website draft saved in this browser.&lt;/div&gt;
&lt;script&gt;
const state={step:1,businessName:&#x27;&#x27;,ownerName:&#x27;&#x27;,category:&#x27;&#x27;,description:&#x27;&#x27;,style:&#x27;&#x27;,special:&#x27;&#x27;,audience:&#x27;&#x27;,tone:&#x27;&#x27;,extra:&#x27;&#x27;};
const questions=[
  {key:&#x27;special&#x27;,text:&#x27;What makes your business different from others nearby?&#x27;},
  {key:&#x27;audience&#x27;,text:&#x27;Who are your ideal customers?&#x27;},
  {key:&#x27;tone&#x27;,text:&#x27;How should the website feel: friendly, premium, professional, youthful, calm or bold?&#x27;},
  {key:&#x27;extra&#x27;,text:&#x27;Is there anything else you want visitors to know?&#x27;}
];
let qIndex=0;
function bindChoices(group){document.querySelectorAll(&#x27;#&#x27;+group+&#x27; .choice&#x27;).forEach(c=&gt;c.addEventListener(&#x27;click&#x27;,()=&gt;{document.querySelectorAll(&#x27;#&#x27;+group+&#x27; .choice&#x27;).forEach(x=&gt;x.classList.remove(&#x27;selected&#x27;));c.classList.add(&#x27;selected&#x27;);c.querySelector(&#x27;input&#x27;).checked=true}))}
bindChoices(&#x27;categoryGrid&#x27;);bindChoices(&#x27;styleGrid&#x27;);
function goTo(n){state.step=n;document.querySelectorAll(&#x27;.screen&#x27;).forEach(s=&gt;s.classList.toggle(&#x27;active&#x27;,+s.dataset.screen===n));document.querySelectorAll(&#x27;.nav button&#x27;).forEach(b=&gt;{const x=+b.dataset.nav;b.classList.toggle(&#x27;active&#x27;,x===n);b.classList.toggle(&#x27;done&#x27;,x&lt;n)});document.getElementById(&#x27;progressBar&#x27;).style.width=(n*20)+&#x27;%&#x27;;document.getElementById(&#x27;stepLabel&#x27;).textContent=&#x27;Step &#x27;+n+&#x27; of 5&#x27;;window.scrollTo({top:0,behavior:&#x27;smooth&#x27;});if(n===3)renderSummary()}
function nextFromBusiness(){
  state.businessName=document.getElementById(&#x27;businessName&#x27;).value.trim();state.ownerName=document.getElementById(&#x27;ownerName&#x27;).value.trim();state.description=document.getElementById(&#x27;businessDescription&#x27;).value.trim();
  const cat=document.querySelector(&#x27;input[name=category]:checked&#x27;);if(!state.businessName||!cat){alert(&#x27;Please enter your business name and choose a category.&#x27;);return}state.category=cat.value;document.getElementById(&#x27;sideProject&#x27;).textContent=state.businessName;goTo(2)
}
function nextFromStyle(){const s=document.querySelector(&#x27;input[name=style]:checked&#x27;);if(!s){alert(&#x27;Please choose one website style.&#x27;);return}state.style=s.value;goTo(3);initChat()}
function initChat(){if(document.getElementById(&#x27;messages&#x27;).children.length)return;addMessage(&#x27;ai&#x27;,`Hi ${state.ownerName||&#x27;there&#x27;}! I’m Nova. I’ll help shape the website for ${state.businessName}.`);setTimeout(()=&gt;addMessage(&#x27;ai&#x27;,questions[0].text),400)}
function addMessage(type,text){const d=document.createElement(&#x27;div&#x27;);d.className=&#x27;message &#x27;+type;d.textContent=text;document.getElementById(&#x27;messages&#x27;).appendChild(d);d.scrollIntoView({behavior:&#x27;smooth&#x27;,block:&#x27;end&#x27;})}
function sendAnswer(){const input=document.getElementById(&#x27;chatInput&#x27;);const value=input.value.trim();if(!value||qIndex&gt;=questions.length)return;addMessage(&#x27;user&#x27;,value);state[questions[qIndex].key]=value;input.value=&#x27;&#x27;;qIndex++;renderSummary();if(qIndex&lt;questions.length)setTimeout(()=&gt;addMessage(&#x27;ai&#x27;,questions[qIndex].text),350);else{setTimeout(()=&gt;addMessage(&#x27;ai&#x27;,&#x27;Perfect. I have everything I need to create your first website draft.&#x27;),350);document.getElementById(&#x27;generateBtn&#x27;).disabled=false}}
function renderSummary(){document.getElementById(&#x27;sumBusiness&#x27;).textContent=state.businessName||&#x27;Not provided yet&#x27;;document.getElementById(&#x27;sumCategory&#x27;).textContent=state.category||&#x27;Not selected yet&#x27;;document.getElementById(&#x27;sumStyle&#x27;).textContent=state.style||&#x27;Not selected yet&#x27;;document.getElementById(&#x27;sumSpecial&#x27;).textContent=state.special||&#x27;Waiting for your answer&#x27;;document.getElementById(&#x27;sumAudience&#x27;).textContent=state.audience||&#x27;Waiting for your answer&#x27;;document.getElementById(&#x27;sumTone&#x27;).textContent=state.tone||&#x27;Waiting for your answer&#x27;}
function startGeneration(){goTo(4);[&#x27;g1&#x27;,&#x27;g2&#x27;,&#x27;g3&#x27;,&#x27;g4&#x27;].forEach((id,i)=&gt;setTimeout(()=&gt;{const row=document.getElementById(id);row.classList.add(&#x27;done&#x27;);row.querySelector(&#x27;.dot&#x27;).textContent=&#x27;✓&#x27;},700*(i+1)));setTimeout(()=&gt;{preparePreview();goTo(5)},3600)}
function preparePreview(){
  const cat=state.category||&#x27;business&#x27;;let headline=`${state.businessName}, thoughtfully designed.`;
  if(state.style===&#x27;Editorial Luxury&#x27;)headline=`Experience ${state.businessName}.`;
  if(state.style===&#x27;Soft Beauty&#x27;)headline=&#x27;Feel beautiful. Feel like yourself.&#x27;;
  if(state.style===&#x27;Modern Minimal&#x27;)headline=`Modern ${cat.toLowerCase()}, made personal.`;
  if(state.style===&#x27;Dark Premium&#x27;)headline=&#x27;Stand out. Feel confident.&#x27;;
  const desc=state.description||`${state.businessName} offers a personalised ${cat.toLowerCase()} experience built around quality, comfort and confidence.`;
  const service=state.special||`Premium ${cat.toLowerCase()} services, tailored to you.`;
  document.getElementById(&#x27;editHeadline&#x27;).value=headline;document.getElementById(&#x27;editHeroText&#x27;).value=desc;document.getElementById(&#x27;editService&#x27;).value=service;document.getElementById(&#x27;previewName&#x27;).textContent=state.businessName;document.getElementById(&#x27;previewKicker&#x27;).textContent=`${state.category} · ${state.style}`;document.getElementById(&#x27;previewSpecial&#x27;).textContent=state.special||&#x27;Designed around your confidence.&#x27;;document.getElementById(&#x27;previewAudience&#x27;).textContent=state.audience||&#x27;Created for customers who value quality, comfort and a personalised experience.&#x27;;applyStyle();updatePreview()
}
function applyStyle(){const h=document.getElementById(&#x27;previewHero&#x27;);if(state.style===&#x27;Soft Beauty&#x27;)h.style.background=&#x27;linear-gradient(90deg,rgba(88,56,69,.82),rgba(88,56,69,.12)),linear-gradient(135deg,#dba9c0,#f2dfd5)&#x27;;else if(state.style===&#x27;Modern Minimal&#x27;)h.style.background=&#x27;linear-gradient(90deg,rgba(25,30,36,.86),rgba(25,30,36,.15)),linear-gradient(135deg,#9da7b1,#e7eaed)&#x27;;else if(state.style===&#x27;Dark Premium&#x27;)h.style.background=&#x27;linear-gradient(90deg,rgba(0,0,0,.92),rgba(0,0,0,.25)),linear-gradient(135deg,#050505,#3b3b3b)&#x27;;else h.style.background=&#x27;linear-gradient(90deg,rgba(42,28,25,.90),rgba(42,28,25,.25)),linear-gradient(135deg,#89685b,#d5ab96)&#x27;}
function updatePreview(){document.getElementById(&#x27;previewHeadline&#x27;).textContent=document.getElementById(&#x27;editHeadline&#x27;).value;document.getElementById(&#x27;previewHeroText&#x27;).textContent=document.getElementById(&#x27;editHeroText&#x27;).value;document.getElementById(&#x27;previewService&#x27;).textContent=document.getElementById(&#x27;editService&#x27;).value}
function rewriteHeadline(){const options=[`Where ${state.category.toLowerCase()} meets confidence.`,`A more beautiful way to experience ${state.category.toLowerCase()}.`,`Designed for you. Created with care.`,`Your next favourite ${state.category.toLowerCase()} experience.`];document.getElementById(&#x27;editHeadline&#x27;).value=options[Math.floor(Math.random()*options.length)];updatePreview()}
function saveDraft(){state.headline=document.getElementById(&#x27;editHeadline&#x27;).value;state.heroText=document.getElementById(&#x27;editHeroText&#x27;).value;state.service=document.getElementById(&#x27;editService&#x27;).value;localStorage.setItem(&#x27;planniqueAIPrototype&#x27;,JSON.stringify(state));const t=document.getElementById(&#x27;toast&#x27;);t.classList.add(&#x27;show&#x27;);setTimeout(()=&gt;t.classList.remove(&#x27;show&#x27;),2600)}
function resetPrototype(){if(!confirm(&#x27;Reset all prototype information?&#x27;))return;localStorage.removeItem(&#x27;planniqueAIPrototype&#x27;);location.reload()}
window.addEventListener(&#x27;load&#x27;,()=&gt;{const saved=localStorage.getItem(&#x27;planniqueAIPrototype&#x27;);if(saved){Object.assign(state,JSON.parse(saved));document.getElementById(&#x27;businessName&#x27;).value=state.businessName||&#x27;&#x27;;document.getElementById(&#x27;ownerName&#x27;).value=state.ownerName||&#x27;&#x27;;document.getElementById(&#x27;businessDescription&#x27;).value=state.description||&#x27;&#x27;;document.getElementById(&#x27;sideProject&#x27;).textContent=state.businessName||&#x27;New Business&#x27;}})
&lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;
"></iframe>
<button id="backBtn" class="back-btn hidden" onclick="showLanding()">← Back to homepage</button>
<script>
function startStudio(){
  document.getElementById('landingView').classList.add('hidden');
  document.getElementById('studioView').classList.remove('hidden');
  document.getElementById('backBtn').classList.remove('hidden');
}
function showLanding(){
  document.getElementById('studioView').classList.add('hidden');
  document.getElementById('landingView').classList.remove('hidden');
  document.getElementById('backBtn').classList.add('hidden');
}
</script>
</body>
</html>
